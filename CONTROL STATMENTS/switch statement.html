<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <script>
    let day = 3; // switch case are use in same variable are multiple value check it is use to switch case.
    // break is very important

    switch (day) {
      case 1:
        console.log("monday");
        break;

      case 2:
        console.log("tuesday");
        break;

      case 3:
        console.log("wednsday");
        break;

      default:
        console.log("invalid");
    }

    let dayformat = 1;

    switch (dayformat) {
      case 1:
        console.log("monday");
        break;

      case 2:
        console.log("tuesday");
        break;

      case 3:
        console.log("wednsday");
        break;

      default:
        console.log("invalid");
    }
  </script>
  <body></body>
</html>
