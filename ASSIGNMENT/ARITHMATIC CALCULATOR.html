<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">

    <style>
    body{
    margin:0;
    background:#f5f5f5;
    font-family:Arial, sans-serif;
}

.main-box{
    width:100%;
    display:flex;
    justify-content:center;
    margin-top:120px;
}

.calculator{
    width:280px;
    background:#12c7cd;
    padding:20px;
    border-radius:3px;
    box-shadow:0 0 10px gray;
}

h2{
    text-align:center;
    color:white;
    margin-top:0;
}

input{
    width:100%;
    height:35px;
    margin-bottom:10px;
    padding-left:10px;
    box-sizing:border-box;
    border:none;
}

.row{
    display:flex;
    gap:5px;
}

select{
    width:180px;
    height:35px;
    border:none;
}

button{
    width:80px;
    background:red;
    color:white;
    border:none;
    cursor:pointer;
}

button:hover{
    background:darkred;
}
</style>
</head>

<body>

    <div class="main-box">

        <div class="calculator">

            <h2>CALCULATOR</h2>

            <input type="number" id="num1" placeholder="Enter First Number">

            <input type="number" id="num2" placeholder="Enter Second Number">

            <div class="row">
                <select id="operator">
                    <option value="+">+</option>
                    <option value="-">-</option>
                    <option value="*">*</option>
                    <option value="/">/</option>
                </select>

                <button onclick="calculate()">Count</button>
            </div>

            <input type="text" id="result" placeholder="Result" readonly>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
