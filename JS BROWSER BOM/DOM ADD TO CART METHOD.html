<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>

    .productgallery{
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        justify-content: center;
        margin: 20px;
        
    }

    .product{
        border: 1px solid black;
        padding: 5px;
        text-align: center;
        width: 200px;
    }

    .productimg{
        max-width: 100%;
        height: auto;
    }

    .description{
        margin-top: 10px;
        font-weight: bold;
    }

    .cart{
        border: 1px solid black;
        padding: 10px;
        background-color:white;
    }
</style>
<body>

    <h1 align="center">PRODUCTS</h1>
    <hr>
    <div class="productgallery">

        <div class="product">
            <img src="https://dummyimage.com/200x150/d900d9/000000.jpg&text=PRODUCT+1"/>
            <div class="description">Product1 Price:₹100</div>
            <button onclick="AddToCart('product1' , 100)">ADD TO CART</button>

        </div>

        <div class="product">
            <img src="https://dummyimage.com/200x150/d900d9/000000.jpg&text=PRODUCT+2"/>
            <div class="description">Product2 Price:₹100</div>
            <button onclick="AddToCart('product2' , 50)">ADD TO CART</button>

        </div>

        <div class="product">
            <img src="https://dummyimage.com/200x150/d900d9/000000.jpg&text=PRODUCT+3"/>
            <div class="description">Product3 Price:₹200</div>
            <button onclick="AddToCart('product3' , 200)">ADD TO CART</button>

        </div>

        <div class="product">
            <img src="https://dummyimage.com/200x150/d900d9/000000.jpg&text=PRODUCT+4"/>
            <div class="description">Product4 Price:₹150</div>
            <button onclick="AddToCart('product4' , 150)">ADD TO CART</button>

        </div>
    </div>

    <br>

    <div class="cart" style="height: 25vh;"></div>
    <div class="total-box">total:₹; <span id="total">0</span></div>


    <script>

        var cart=[];
        var total=0;
        var product={
            name:"",
            price:"0",
            quantity:1,
        };


        function AddToCart(productname, price){
            product={
                name:productname,
                price:price,
                quantity:1,
            };

            let item=cart.find(i=>i.name===productname);
            if (item){
                item.quantity+=1;
            }
            else{
                cart.push(product);
            }

            total+=price;
            document.getElementById("total").innerText=total;
            updatecarddisplay();

            console.log(cart);
        }


        function updatecarddisplay(){
            var cartdiv=document.querySelector('.cart')
            cartdiv.innerHTML="";
            if(cart.length===0){
                cartdiv.innerHTML='<p><p>Your Cart is Empty</p>'
        return;

    }
           

        var ul=document.createElement('ul');
        cart.forEach(function(item){
            var li=document.createElement('li');
            li.innerText=item.name+' -price ₹:' + item.price + '-quantity';
            ul.appendChild(li);
        });

        cartdiv.appendChild(ul);
    }
    
    </script>
    
</body>
</html>
