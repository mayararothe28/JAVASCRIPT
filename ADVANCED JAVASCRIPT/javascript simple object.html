<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      var person = new Object();
      person.firstname = "mayara";
      person.lastname = "rothe";
      person.age = 20;
      person.eyecolor = "blue";

      document.write(person.firstname + "is" + person.age + "year old.<br>");
      



      //using constructor output same

     function myname(firstname,lastname,age,eyecolor){
        this.firstname=firstname;
        this.lastname=lastname;
        this.age=age;
        this.eyecolor=eyecolor;
     }
     myfather=new myname("mayara","rothe",20,"blue");


     document.write(myfather.firstname + "is", + myfather.age +"yearold");
    </script>
  </body>
</html>
