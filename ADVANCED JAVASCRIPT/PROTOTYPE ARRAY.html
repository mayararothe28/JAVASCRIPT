<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p id="demo">click the button to create a method</p>
    <button onclick="myFunction()">try it</button>

    <script>
        Array.prototype.myvcase=function()
        {
            for ( var i=0; i< this.length;i++)
            {
                this[i]=this[i].toUpperCase()
            }
        }

        function myFunction(){
            var fruits=["banana", "orange", "apple"];
            fruits.myvcase();
            var x=document.getElementById("demo");x.innerHTML=fruits;
                }
    </script>
    
</body>
</html>
