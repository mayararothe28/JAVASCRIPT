<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
      function storedata() {
        var person = {}
        firstname = " "
        lastname = ""
        age = ""
      
    
      person.firstname = document.forms["regform"]["firstname"].value;
      person.lastname = document.forms["regform"]["lastname"].value;
      person.age= document.forms["regform"]["age"].value;
      console.log("person");
      alert("data stored succesfully")
      }
    </script>
  </head>

  <body>
    <h1 align="center">REGISTRATION</h1>
    <hr />
    <form name="regform" onsubmit="storedata()" return false>
      firstname:<input type="text" name="firstname" /> <br /><br />
      lastname:<input type="text" name="lastname" /> <br /><br />
      age:<input type="age" name="age" /><br /><br />
      <input type="submit" value="submit" />
    </form>
  </body>
</html>
