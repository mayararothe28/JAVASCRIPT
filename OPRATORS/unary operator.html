<script>
    let a=5;           //increment
    a++;
    console.log(a);

    let b=5;
    b--;
    console.log(b);         //decrement



    let e=25;
    console.log(e++);  //post increment

    

    let f=30;              //pre increment
    console.log(++f);

</script>
